[runtime]
mode = "dev"

[server]
bind = "127.0.0.1:8080"

[security]
api_key = "change-me"

[workers]
concurrency = 2

[storage]
backend = "postgres"
database_url = "postgres://tardigrade:tardigrade@127.0.0.1:5432/tardigrade"

[queue]
backend = "redis"
redis_url = "redis://127.0.0.1:6379"
redis_prefix = "tardigrade"
