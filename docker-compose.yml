services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tardigrade
      POSTGRES_PASSWORD: tardigrade
      POSTGRES_DB: tardigrade
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tardigrade -d tardigrade"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - tardigrade_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  tardigrade-init-data:
    image: alpine:3.20
    command:
      - /bin/sh
      - -c
      - chown -R 10001:10001 /data
    volumes:
      - tardigrade_data:/data
    restart: "no"

  tardigrade-controller:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: tardigrade-server:local
    container_name: tardigrade-controller
    restart: unless-stopped
    environment:
      TARDIGRADE_BIND_ADDR: 0.0.0.0:8080
      TARDIGRADE_SERVICE_NAME: tardigrade-ci
      TARDIGRADE_EMBEDDED_WORKER: "false"
      TARDIGRADE_DATABASE_URL: postgres://tardigrade:tardigrade@postgres:5432/tardigrade
      TARDIGRADE_REDIS_URL: redis://redis:6379
      TARDIGRADE_REDIS_PREFIX: tardigrade
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      tardigrade-init-data:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - tardigrade_data:/data

  tardigrade-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: tardigrade-worker:local
    restart: unless-stopped
    depends_on:
      - tardigrade-controller
    environment:
      TARDIGRADE_SERVER_URL: http://tardigrade-controller:8080
      TARDIGRADE_WORKER_POLL_MS: "250"
    command:
      - /bin/sh
      - -c
      - export TARDIGRADE_WORKER_ID="$${HOSTNAME}" && exec tardigrade-worker

volumes:
  tardigrade_data:
  tardigrade_pgdata:
