<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Tardigrade CI Architecture</title>
  <desc id="desc">Logical architecture across crates and key module adhesions.</desc>

  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .title { font: 700 34px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1f2a37; }
      .subtitle { font: 400 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #334155; }
      .group { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 18; }
      .group-title { font: 700 18px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0f172a; }
      .box { fill: #fffdf7; stroke: #64748b; stroke-width: 1.4; rx: 10; }
      .box-core { fill: #fef3c7; }
      .box-api { fill: #dcfce7; }
      .box-app { fill: #dbeafe; }
      .box-worker { fill: #fae8ff; }
      .box-ext { fill: #e2e8f0; }
      .label { font: 600 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #334155; }
      .note { font: 500 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #475569; }
      .legend { font: 500 13px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1e293b; }
      .arrow { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrowheadSoft); }
      .arrow-dashed { stroke: #475569; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowheadSoft); }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#0f172a" />
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#334155" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1100" />

  <text class="title" x="50" y="62">Tardigrade CI - Architecture Logique</text>
  <text class="subtitle" x="50" y="90">Crates, modules internes majeurs, et adherences techniques</text>

  <!-- Groups -->
  <rect class="group" x="40" y="130" width="500" height="860" />
  <text class="group-title" x="60" y="165">Presentation / Runtime</text>

  <rect class="group" x="560" y="130" width="720" height="860" />
  <text class="group-title" x="580" y="165">Control Plane &amp; Domain</text>

  <rect class="group" x="1300" y="130" width="460" height="860" />
  <text class="group-title" x="1320" y="165">Integrations / Backends</text>

  <!-- Left lane -->
  <rect class="box box-ext" x="70" y="210" width="440" height="92" />
  <text class="label" x="90" y="240">dashboard/ (React + Vite)</text>
  <text class="small" x="90" y="262">UI admin; build -> target/public</text>
  <text class="small" x="90" y="282">Consomme endpoints HTTP + GraphQL + SSE</text>

  <rect class="box box-app" x="70" y="340" width="440" height="170" />
  <text class="label" x="90" y="370">crates/server</text>
  <text class="small" x="90" y="392">main.rs: composition root runtime</text>
  <text class="small" x="90" y="412">- choisit Storage (InMemory/Postgres)</text>
  <text class="small" x="90" y="432">- choisit Scheduler (InMemory/Redis)</text>
  <text class="small" x="90" y="452">- monte routes dashboard assets</text>
  <text class="small" x="90" y="472">- build_router(state) du crate api</text>

  <rect class="box box-worker" x="70" y="560" width="440" height="150" />
  <text class="label" x="90" y="590">crates/worker (process externe)</text>
  <text class="small" x="90" y="612">worker_api.rs: POST /claim, POST /complete</text>
  <text class="small" x="90" y="632">worker_steps.rs: boucle claim -> run -> complete</text>
  <text class="small" x="90" y="652">Couplage DTO avec tardigrade-api</text>

  <!-- Center lane -->
  <rect class="box box-api" x="590" y="210" width="660" height="260" />
  <text class="label" x="610" y="240">crates/api</text>
  <text class="small" x="610" y="262">Modules: routing, handlers, state, service, graphql, http_models, events</text>
  <text class="small" x="610" y="282">routing/mod.rs: route toutes les capacites (jobs, builds, workers, plugins, scm)</text>
  <text class="small" x="610" y="302">state/api_state.rs: assemble service + plugin registry + policies</text>
  <text class="small" x="610" y="322">service/ci_service.rs: orchestration metier</text>
  <text class="small" x="610" y="342">Expose DTO utilises aussi par worker (ClaimBuildResponse, CompleteBuildRequest)</text>
  <text class="small" x="610" y="362">Surface API: /health, /live, /ready, /graphql, /events, /jobs, /builds, ...</text>

  <rect class="box box-core" x="590" y="510" width="310" height="210" />
  <text class="label" x="610" y="540">crates/core</text>
  <text class="small" x="610" y="562">job/: BuildRecord, JobDefinition, JobStatus</text>
  <text class="small" x="610" y="582">pipeline/: DSL + validation</text>
  <text class="small" x="610" y="602">scm/: ScmProvider, configs</text>
  <text class="small" x="610" y="622">technology/: profils runtime</text>
  <text class="small" x="610" y="652">Noyau de types partages</text>

  <rect class="box" x="940" y="510" width="310" height="210" />
  <text class="label" x="960" y="540">crates/executor</text>
  <text class="small" x="960" y="562">worker/worker_executor.rs</text>
  <text class="small" x="960" y="582">Run embarque simule (embedded worker)</text>
  <text class="small" x="960" y="602">Transforme BuildRecord -> BuildRecord</text>

  <rect class="box" x="590" y="760" width="310" height="180" />
  <text class="label" x="610" y="790">crates/plugins</text>
  <text class="small" x="610" y="812">Plugin, PluginRegistry, policies</text>
  <text class="small" x="610" y="832">Lifecycle: load/init/execute/unload</text>

  <rect class="box" x="940" y="760" width="310" height="180" />
  <text class="label" x="960" y="790">crates/auth</text>
  <text class="small" x="960" y="812">ApiKeyAuth</text>
  <text class="small" x="960" y="832">Faible adhesion actuelle (peu integre)</text>

  <!-- Right lane -->
  <rect class="box" x="1330" y="240" width="400" height="220" />
  <text class="label" x="1350" y="270">crates/storage</text>
  <text class="small" x="1350" y="292">contract::Storage (source of truth)</text>
  <text class="small" x="1350" y="312">backend::InMemoryStorage / PostgresStorage</text>
  <text class="small" x="1350" y="332">mapping + codec relies on core types</text>

  <rect class="box" x="1330" y="520" width="400" height="210" />
  <text class="label" x="1350" y="550">crates/scheduler</text>
  <text class="small" x="1350" y="572">contract::Scheduler (enqueue/claim/ack/requeue)</text>
  <text class="small" x="1350" y="592">backend::InMemoryScheduler / RedisScheduler</text>
  <text class="small" x="1350" y="612">worker_loads + reclaim_stale</text>

  <rect class="box box-ext" x="1330" y="790" width="400" height="150" />
  <text class="label" x="1350" y="820">External Systems</text>
  <text class="small" x="1350" y="842">PostgreSQL, Redis, SCM providers</text>
  <text class="small" x="1350" y="862">(accesses through storage/scheduler/api service)</text>

  <!-- Main arrows -->
  <path class="arrow" d="M510 386 C 545 386, 550 320, 590 320" />
  <text class="note" x="520" y="350">HTTP / GraphQL / SSE</text>

  <path class="arrow" d="M510 620 C 545 620, 550 360, 590 360" />
  <text class="note" x="470" y="575">claim/complete API</text>

  <path class="arrow" d="M920 610 C 970 610, 980 610, 940 610" />

  <path class="arrow" d="M1030 470 C 1030 500, 760 500, 760 510" />
  <text class="note" x="875" y="495">domain types</text>

  <path class="arrow" d="M1080 470 C 1080 500, 1090 500, 1090 510" />
  <text class="note" x="1110" y="495">embedded run</text>

  <path class="arrow" d="M1250 330 C 1290 330, 1295 330, 1330 330" />
  <text class="note" x="1262" y="318">Storage trait calls</text>

  <path class="arrow" d="M1250 370 C 1290 430, 1295 610, 1330 610" />
  <text class="note" x="1262" y="454">Scheduler trait calls</text>

  <path class="arrow-soft" d="M900 600 C 1080 600, 1160 360, 1330 360" />
  <text class="note" x="1000" y="560">core types reused by storage mapping</text>

  <path class="arrow-soft" d="M900 600 C 1080 640, 1160 640, 1330 640" />
  <text class="note" x="1020" y="666">Uuid build ids into queue</text>

  <path class="arrow-dashed" d="M900 820 C 960 820, 980 840, 940 840" />
  <path class="arrow-dashed" d="M1250 840 C 1290 840, 1295 840, 1330 840" />
  <text class="note" x="1060" y="855">auth currently low integration</text>

  <path class="arrow-soft" d="M1730 360 C 1760 360, 1760 860, 1730 860" />
  <path class="arrow-soft" d="M1730 610 C 1760 610, 1760 860, 1730 860" />

  <!-- Legend -->
  <rect class="group" x="40" y="1005" width="1720" height="70" />
  <line class="arrow" x1="80" y1="1040" x2="160" y2="1040" />
  <text class="legend" x="175" y="1045">Adherence forte (appel direct / contrat compile-time)</text>
  <line class="arrow-soft" x1="650" y1="1040" x2="730" y2="1040" />
  <text class="legend" x="745" y="1045">Adherence moderee (types partages / integration secondaire)</text>
  <line class="arrow-dashed" x1="1240" y1="1040" x2="1320" y2="1040" />
  <text class="legend" x="1335" y="1045">Adherence faible / en attente d'integration</text>
</svg>
