<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Tardigrade CI Architecture 16:9</title>
  <desc id="desc">Logical architecture with crate dependencies and major module adhesions.</desc>

  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .title { font: 700 38px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Helvetica, Arial, sans-serif; fill: #334155; }
      .lane { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 16; }
      .lane-title { font: 700 19px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .box { fill: #fffdf7; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .app { fill: #dbeafe; }
      .api { fill: #dcfce7; }
      .core { fill: #fef3c7; }
      .worker { fill: #fae8ff; }
      .ext { fill: #e2e8f0; }
      .label { font: 700 15px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 12px Helvetica, Arial, sans-serif; fill: #334155; }
      .note { font: 500 12px Helvetica, Arial, sans-serif; fill: #475569; }
      .legend { font: 500 13px Helvetica, Arial, sans-serif; fill: #1e293b; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrowheadSoft); }
      .arrow-dashed { stroke: #475569; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowheadSoft); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#0f172a"/>
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <text class="title" x="48" y="62">Tardigrade CI - Architecture Logique (16:9)</text>
  <text class="subtitle" x="48" y="92">Crates, modules majeurs et adherences techniques</text>

  <rect class="lane" x="40" y="120" width="520" height="860"/>
  <text class="lane-title" x="62" y="154">Presentation / Runtime</text>

  <rect class="lane" x="580" y="120" width="760" height="860"/>
  <text class="lane-title" x="602" y="154">Control Plane &amp; Domain</text>

  <rect class="lane" x="1360" y="120" width="520" height="860"/>
  <text class="lane-title" x="1382" y="154">Backends &amp; Integrations</text>

  <rect class="box ext" x="72" y="198" width="456" height="102"/>
  <text class="label" x="92" y="228">dashboard/ (React + Vite)</text>
  <text class="small" x="92" y="250">UI admin; build vers target/public</text>
  <text class="small" x="92" y="270">Consomme HTTP, GraphQL et SSE</text>

  <rect class="box app" x="72" y="330" width="456" height="192"/>
  <text class="label" x="92" y="360">crates/server</text>
  <text class="small" x="92" y="382">main.rs: composition root runtime</text>
  <text class="small" x="92" y="402">choix Storage (InMemory/Postgres)</text>
  <text class="small" x="92" y="422">choix Scheduler (InMemory/Redis)</text>
  <text class="small" x="92" y="442">build_router(state) depuis crate api</text>
  <text class="small" x="92" y="462">dashboard assets routes</text>

  <rect class="box worker" x="72" y="558" width="456" height="176"/>
  <text class="label" x="92" y="588">crates/worker (process externe)</text>
  <text class="small" x="92" y="610">worker_api.rs: claim + complete</text>
  <text class="small" x="92" y="630">worker_steps.rs: claim -> run -> complete</text>
  <text class="small" x="92" y="650">Couplage DTO avec tardigrade-api</text>

  <rect class="box api" x="610" y="198" width="700" height="278"/>
  <text class="label" x="632" y="228">crates/api</text>
  <text class="small" x="632" y="250">mods: routing, handlers, state, service, graphql, http_models, events</text>
  <text class="small" x="632" y="270">routing/mod.rs centralise routes jobs/builds/workers/plugins/scm</text>
  <text class="small" x="632" y="290">state/api_state.rs assemble service + plugin registry + policies</text>
  <text class="small" x="632" y="310">service/ci_service.rs orchestre core + storage + scheduler + executor</text>
  <text class="small" x="632" y="330">Expose DTO partages avec worker</text>
  <text class="small" x="632" y="350">/health /live /ready /graphql /events /jobs /builds ...</text>

  <rect class="box core" x="610" y="512" width="336" height="220"/>
  <text class="label" x="632" y="542">crates/core</text>
  <text class="small" x="632" y="564">job/: BuildRecord, JobDefinition, JobStatus</text>
  <text class="small" x="632" y="584">pipeline/: DSL + validation</text>
  <text class="small" x="632" y="604">scm/: ScmProvider + configs</text>
  <text class="small" x="632" y="624">technology/: profils runtime</text>

  <rect class="box" x="974" y="512" width="336" height="220"/>
  <text class="label" x="996" y="542">crates/executor</text>
  <text class="small" x="996" y="564">worker_executor.rs</text>
  <text class="small" x="996" y="584">Execution embarquee simulee</text>
  <text class="small" x="996" y="604">BuildRecord -> BuildRecord</text>

  <rect class="box" x="610" y="760" width="336" height="180"/>
  <text class="label" x="632" y="790">crates/plugins</text>
  <text class="small" x="632" y="812">Plugin, PluginRegistry, policies</text>
  <text class="small" x="632" y="832">load/init/execute/unload</text>

  <rect class="box" x="974" y="760" width="336" height="180"/>
  <text class="label" x="996" y="790">crates/auth</text>
  <text class="small" x="996" y="812">ApiKeyAuth</text>
  <text class="small" x="996" y="832">Faible adhesion actuelle</text>

  <rect class="box" x="1392" y="238" width="456" height="220"/>
  <text class="label" x="1414" y="268">crates/storage</text>
  <text class="small" x="1414" y="290">contract::Storage (source of truth)</text>
  <text class="small" x="1414" y="310">backend::InMemoryStorage / PostgresStorage</text>
  <text class="small" x="1414" y="330">mapping + codec appuyes sur core</text>

  <rect class="box" x="1392" y="520" width="456" height="210"/>
  <text class="label" x="1414" y="550">crates/scheduler</text>
  <text class="small" x="1414" y="572">contract::Scheduler (enqueue/claim/ack/requeue)</text>
  <text class="small" x="1414" y="592">backend::InMemoryScheduler / RedisScheduler</text>
  <text class="small" x="1414" y="612">worker_loads + reclaim_stale</text>

  <rect class="box ext" x="1392" y="790" width="456" height="150"/>
  <text class="label" x="1414" y="820">Systemes externes</text>
  <text class="small" x="1414" y="842">PostgreSQL, Redis, SCM providers</text>
  <text class="small" x="1414" y="862">accedes via storage/scheduler/service</text>

  <path class="arrow" d="M528 390 C 560 390, 572 335, 610 335"/>
  <text class="note" x="536" y="358">HTTP / GraphQL / SSE</text>

  <path class="arrow" d="M528 642 C 560 642, 572 358, 610 358"/>
  <text class="note" x="494" y="608">claim/complete</text>

  <path class="arrow" d="M1310 332 C 1350 332, 1358 332, 1392 332"/>
  <text class="note" x="1318" y="320">Storage trait</text>

  <path class="arrow" d="M1310 372 C 1352 430, 1358 618, 1392 618"/>
  <text class="note" x="1318" y="454">Scheduler trait</text>

  <path class="arrow" d="M1000 476 C 1000 496, 780 496, 780 512"/>
  <text class="note" x="842" y="494">types domaine</text>

  <path class="arrow" d="M1140 476 C 1140 496, 1140 496, 1140 512"/>
  <text class="note" x="1150" y="495">embedded run</text>

  <path class="arrow-soft" d="M946 622 C 1120 622, 1240 360, 1392 360"/>
  <text class="note" x="1040" y="586">core reutilise par storage mapping</text>

  <path class="arrow-soft" d="M946 646 C 1120 686, 1240 646, 1392 646"/>
  <text class="note" x="1060" y="692">ids build vers queue</text>

  <path class="arrow-dashed" d="M946 846 C 974 846, 980 850, 974 850"/>
  <path class="arrow-dashed" d="M1310 846 C 1350 846, 1358 846, 1392 846"/>
  <text class="note" x="1102" y="860">auth: integration encore limitee</text>

  <path class="arrow-soft" d="M1848 360 C 1880 360, 1880 864, 1848 864"/>
  <path class="arrow-soft" d="M1848 618 C 1880 618, 1880 864, 1848 864"/>

  <rect class="lane" x="40" y="996" width="1840" height="62"/>
  <line class="arrow" x1="84" y1="1026" x2="162" y2="1026"/>
  <text class="legend" x="176" y="1031">Adherence forte (appel direct, contrat compile-time)</text>
  <line class="arrow-soft" x1="700" y1="1026" x2="778" y2="1026"/>
  <text class="legend" x="792" y="1031">Adherence moderee (types partages, integration secondaire)</text>
  <line class="arrow-dashed" x1="1332" y1="1026" x2="1410" y2="1026"/>
  <text class="legend" x="1424" y="1031">Adherence faible / en attente d'integration</text>
</svg>
