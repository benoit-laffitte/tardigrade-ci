apiVersion: apps/v1
kind: Deployment
metadata:
  name: tardigrade-worker
  labels:
    app: tardigrade-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tardigrade-worker
  template:
    metadata:
      labels:
        app: tardigrade-worker
    spec:
      containers:
      - name: worker
        image: tardigrade-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: TARDIGRADE_SERVER_URL
          value: http://tardigrade-server:8080
        - name: TARDIGRADE_WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: TARDIGRADE_WORKER_POLL_MS
          value: "250"
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
