apiVersion: apps/v1
kind: Deployment
metadata:
  name: tardigrade-server
  labels:
    app: tardigrade-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tardigrade-server
  template:
    metadata:
      labels:
        app: tardigrade-server
    spec:
      containers:
      - name: server
        image: tardigrade-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: TARDIGRADE_BIND_ADDR
          value: 0.0.0.0:8080
        - name: TARDIGRADE_EMBEDDED_WORKER
          value: "false"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tardigrade-server
  labels:
    app: tardigrade-server
spec:
  selector:
    app: tardigrade-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  type: ClusterIP
