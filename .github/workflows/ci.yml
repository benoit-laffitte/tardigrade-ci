name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust quality and tests
        run: |
          make lint
          make test-all

      - name: Build release binaries for Docker runtime images
        run: make build-rust-release-images

      - name: Upload release binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/tardigrade-server
            target/release/tardigrade-worker
          if-no-files-found: error

  node:
    name: Node
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Dashboard lint and build
        run: |
          make dashboard-install dashboard-lint dashboard-build


  pipeline-summary-gate:
    name: Pipeline Summary Gate
    runs-on: ubuntu-latest
    needs: [rust, node]
    if: ${{ always() }}

    steps:
      - name: Check upstream job results
        run: |
          echo "rust=${{ needs.rust.result }}"
          echo "node=${{ needs.node.result }}"

          [[ "${{ needs.rust.result }}" == "success" ]] || exit 1
          [[ "${{ needs.node.result }}" == "success" ]] || exit 1
         
